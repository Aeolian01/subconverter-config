[custom]
;不要随意改变关键字，否则会导致出错
;Mihomo AI 三分流 + 兼容分组模板

; OpenAI / Gemini / Anthropic Clash 文本规则源
ruleset=🤖 OpenAi,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/OpenAI/OpenAI.list
ruleset=🤖 Gemini,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Gemini/Gemini.list
ruleset=🤖 Anthropic,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Claude/Claude.list
ruleset=🎯 全球直连,[]GEOIP,CN
ruleset=🐟 漏网之鱼,[]FINAL

; 新版 Mihomo 已移除 relay 策略组。这里保留港/美落地与手动选择，避免配置检查失败。
custom_proxy_group=🚀 节点选择`select`[]🇭🇰 香港节点`[]🇺🇲 美国节点`[]☑️ 手动选择`[]DIRECT
custom_proxy_group=☑️ 手动选择`select`.*
custom_proxy_group=🇭🇰 香港节点`load-balance`(港|HK|hk|Hong Kong|HongKong|hongkong|HKG)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇺🇲 美国节点`load-balance`(美|US|United States|美国|洛杉矶|西雅图|硅谷|圣何塞|达拉斯)`http://www.gstatic.com/generate_204`300,,150
custom_proxy_group=🤖 OpenAi`select`[]🇭🇰 香港节点`[]🇺🇲 美国节点`[]☑️ 手动选择`[]DIRECT
custom_proxy_group=🤖 Gemini`select`[]🇭🇰 香港节点`[]🇺🇲 美国节点`[]☑️ 手动选择`[]DIRECT
custom_proxy_group=🤖 Anthropic`select`[]🇭🇰 香港节点`[]🇺🇲 美国节点`[]☑️ 手动选择`[]DIRECT
custom_proxy_group=🎯 全球直连`select`[]DIRECT`[]🚀 节点选择
custom_proxy_group=🐟 漏网之鱼`select`[]🚀 节点选择`[]DIRECT

enable_rule_generator=true
overwrite_original_rules=true
